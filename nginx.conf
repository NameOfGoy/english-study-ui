# Gas Turbine Model UI - Nginx Configuration
# 此配置文件用于从宿主机挂载到容器中

server {
    listen 80;
    server_name _;
    
    # 设置最大上传文件大小为2GB
    client_max_body_size 2048M;
    
    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;
     
    # 设置根目录
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # 处理前端路由（SPA应用）
    location / {
        try_files $uri $uri/ /index.html;

        # 默认禁缓存: SPA fallback 命中时 URI 是 /practice / /dashboard 这类, 不会匹配 \.html$
        # (nginx try_files fallback 不会重写客户端可见的请求 URI), 因此必须在这里显式禁缓存,
        # 否则浏览器会按启发式缓存 index.html → 部署后旧 hash 的 JS 分包 404 → 路由 push 静默失败
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";

        # 静态资源 (vite 文件名带 content hash, 内容变了文件名也变) 长缓存
        # 注: nginx 的 add_header 在嵌套 location 里不继承父级, 这里的会替换掉上面那两条
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # JSON文件缓存策略
        location ~* \.(json)$ {
            expires 1h;
            add_header Cache-Control "public";
        }
    }


    # 文件服务代理配置 - 将/api/v1/file请求转发到minio服务
    location /api/v1/file/ {
        # 截取/api/v1/file后面的路径，转发到minio
        rewrite ^/api/v1/file/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_request_buffering on;
    }

    # API代理配置 - 将/api/v1请求转发到english-study服务
    location /api/v1 {
        # 代理到后端服务
        # 在docker-compose中可以使用服务名作为主机名
        proxy_pass http://english-study:8888/api/v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_request_buffering on;
    }
}
